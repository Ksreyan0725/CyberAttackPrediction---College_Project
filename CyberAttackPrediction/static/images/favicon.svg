<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22d3ee"/>
            <stop offset="100%" stop-color="#6366f1"/>
        </linearGradient>
        <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#818cf8"/>
        </linearGradient>
    </defs>

    <!-- Dark rounded background -->
    <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="#050d1f"/>

    <!-- Bold Hexagon (Cybersecurity mark) -->
    <polygon
        points="50,14 82,32 82,68 50,86 18,68 18,32"
        fill="none"
        stroke="url(#g)"
        stroke-width="6"
        stroke-linejoin="round"
    />

    <!-- Neural Triangle: AI (top) → ML (bottom-left) → DL (bottom-right) -->
    <!-- Connections -->
    <line x1="50" y1="37" x2="36" y2="62" stroke="url(#g2)" stroke-width="2.5" opacity="0.6"/>
    <line x1="50" y1="37" x2="64" y2="62" stroke="url(#g2)" stroke-width="2.5" opacity="0.6"/>
    <line x1="36" y1="62" x2="64" y2="62" stroke="url(#g2)" stroke-width="2.5" opacity="0.6"/>

    <!-- AI Core (top, larger) -->
    <circle cx="50" cy="37" r="9" fill="url(#g)"/>

    <!-- ML Node (bottom-left) -->
    <circle cx="36" cy="62" r="6" fill="#22d3ee" opacity="0.9"/>

    <!-- DL Node (bottom-right) -->
    <circle cx="64" cy="62" r="6" fill="#6366f1" opacity="0.9"/>
</svg>
