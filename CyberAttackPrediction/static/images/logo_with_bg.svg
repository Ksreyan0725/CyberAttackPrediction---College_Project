<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="28" height="28">
    <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22d3ee"/>
            <stop offset="100%" stop-color="#6366f1"/>
        </linearGradient>
        <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#818cf8"/>
        </linearGradient>
    </defs>

    <!-- Dark rounded background for documentation/README visibility -->
    <rect x="5" y="5" width="90" height="90" rx="20" fill="#050d1f" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Bold Hexagon (Cybersecurity mark) - Scaled slightly for padding -->
    <polygon
        points="50,22 76,37 76,63 50,78 24,63 24,37"
        fill="none"
        stroke="url(#g)"
        stroke-width="5"
        stroke-linejoin="round"
    />
    
    <!-- White Inner Outline for maximum visibility in dark mode -->
    <polygon
        points="50,22 76,37 76,63 50,78 24,63 24,37"
        fill="none"
        stroke="white"
        stroke-width="1.5"
        stroke-linejoin="round"
        opacity="0.5"
    />

    <!-- Neural Triangle Connections -->
    <line x1="50" y1="42" x2="38" y2="62" stroke="url(#g2)" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="42" x2="62" y2="62" stroke="url(#g2)" stroke-width="2" opacity="0.6"/>
    <line x1="38" y1="62" x2="62" y2="62" stroke="url(#g2)" stroke-width="2" opacity="0.6"/>

    <!-- AI Core (top) -->
    <circle cx="50" cy="42" r="8" fill="url(#g)"/>

    <!-- ML Node (bottom-left) -->
    <circle cx="38" cy="62" r="5" fill="#22d3ee"/>

    <!-- DL Node (bottom-right) -->
    <circle cx="62" cy="62" r="5" fill="#6366f1"/>
</svg>
