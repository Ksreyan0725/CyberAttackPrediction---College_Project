{% extends "base.html" %}

{% block title %}User Login - CyberShield AI{% endblock %}

{% block extra_css %}
<style>
    /* Ensure the body takes full height and uses flex to push footer to bottom */
    html, body {
        height: 100%;
        margin: 0;
    }
    
    body {
        display: flex;
        flex-direction: column;
        overflow: hidden; /* Prevent scrolling on this page */
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        background-attachment: fixed;
    }

    main {
        flex: 1; /* Take up all available space between navbar and footer */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .footer {
        flex-shrink: 0; /* Don't allow footer to shrink */
    }

    .login-container {
        width: 100%;
        max-width: 450px;
        animation: fadeInUp 0.8s ease-out;
    }

    .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5) !important;
        color: white;
    }

    .card-header {
        background: rgba(255, 255, 255, 0.05);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 2rem !important;
    }

    .form-control {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white !important;
        border-radius: 12px;
        padding: 0.75rem 1rem;
    }

    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }

    .form-control:focus {
        background: rgba(255, 255, 255, 0.1);
        border-color: #3b82f6;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
    }

    .input-group-text {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #3b82f6;
        border-right: none;
    }

    .form-control {
        border-radius: 0 12px 12px 0;
    }

    .btn-primary {
        border-radius: 12px;
        padding: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white text-center py-4">
            <h2 class="h4 mb-0"><i class="fas fa-user-lock me-2"></i>User Login</h2>
        </div>
        <div class="card-body p-4 p-md-5">
            {% if msg %}
            <div class="alert alert-info alert-dismissible fade show mb-4" role="alert">
                {{ msg|safe }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endif %}

            <form name="f1" method="post" action="/UserLoginAction" onsubmit="return validateForm(this);">
                <div class="mb-4">
                    <label for="t1" class="form-label fw-bold text-muted small">USERNAME</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-user text-primary"></i></span>
                        <input type="text" class="form-control border-0 bg-light" id="t1" name="t1" placeholder="Enter username" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="t2" class="form-label fw-bold text-muted small">PASSWORD</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-key text-primary"></i></span>
                        <input type="password" class="form-control border-0 bg-light" id="t2" name="t2" placeholder="Enter password" required>
                    </div>
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </div>
            </form>
        </div>
        <div class="card-footer bg-light text-center py-3 border-0">
            <small class="text-muted">Need help? Contact project administrator</small>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function validateForm(form) {
        if (form.t1.value.trim() === "") {
            alert("Please enter your username");
            form.t1.focus();
            return false;
        }
        if (form.t2.value.trim() === "") {
            alert("Please enter your password");
            form.t2.focus();
            return false;
        }
        return true;
    }
</script>
{% endblock %}
