{% extends "base.html" %}

{% block title %}User Login - CyberShield AI{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white text-center py-4 rounded-top">
                    <h2 class="h4 mb-0"><i class="fas fa-user-lock me-2"></i>User Login</h2>
                </div>
                <div class="card-body p-5">
                    {% if msg %}
                    <div class="alert alert-info alert-dismissible fade show" role="alert">
                        {{ msg|safe }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endif %}

                    <form name="f1" method="post" action="/UserLoginAction" onsubmit="return validateForm(this);">
                        <div class="mb-4">
                            <label for="t1" class="form-label fw-bold text-muted">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-primary"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0" id="t1" name="t1" placeholder="Enter username" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="t2" class="form-label fw-bold text-muted">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-key text-primary"></i></span>
                                <input type="password" class="form-control border-start-0 ps-0" id="t2" name="t2" placeholder="Enter password" required>
                            </div>
                        </div>
                        <div class="d-grid gap-2 mt-5">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                <i class="fas fa-sign-in-alt me-2"></i>Login
                            </button>
                        </div>
                    </form>
                </div>
                <div class="card-footer bg-light text-center py-3 rounded-bottom">
                    <small class="text-muted">Need help? Contact project administrator</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function validateForm(form) {
        if (form.t1.value.trim() === "") {
            alert("Please enter your username");
            form.t1.focus();
            return false;
        }
        if (form.t2.value.trim() === "") {
            alert("Please enter your password");
            form.t2.focus();
            return false;
        }
        return true;
    }
</script>
{% endblock %}
